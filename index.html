<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPay - Import Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #24292e; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .aurapay-blue { background-color: #037dd6; }
        .aurapay-blue:hover { background-color: #0260a4; }
        .outline-button { border: 2px solid #037dd6; color: #037dd6; }
        .hidden { display: none; }
        input:focus, textarea:focus { border-color: #037dd6; outline: none; }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md flex items-center justify-between mt-4 mb-10">
        <button onclick="showPage('setup-page')" class="text-[#037dd6] font-semibold text-lg flex items-center">
            <span class="text-3xl mr-1 mb-1">‹</span> Back
        </button>
        <h2 class="text-xl font-bold tracking-[0.3em] text-gray-200">AURAPAY</h2>
        <div class="w-10"></div>
    </div>

    <div id="setup-page" class="w-full max-w-md flex flex-col items-center">
        <div class="text-center mt-10">
            <h1 class="text-4xl font-bold mb-4">Wallet setup</h1>
            <p class="text-gray-400 text-lg mb-12 px-6">Import an existing wallet or create a new one</p>
            <div class="space-y-5 w-full px-4">
                <button onclick="showPage('import-page')" class="w-full outline-button py-4 rounded-full font-bold text-[16px]">Import using Secret Recovery Phrase</button>
                <button onclick="showPage('password-page')" class="w-full aurapay-blue py-4 rounded-full font-bold text-[16px] shadow-lg">Create a new wallet</button>
            </div>
        </div>
    </div>

    <div id="password-page" class="hidden w-full max-w-md">
        <h1 class="text-3xl font-bold mb-4 text-center">Create password</h1>
        <p class="text-gray-400 mb-8 text-center">This password will unlock your AuraPay wallet only on this device.</p>
        <div class="space-y-6 px-4">
            <input type="password" placeholder="New password (8+ chars)" class="w-full bg-[#1c2125] border border-gray-600 p-4 rounded-xl text-white">
            <input type="password" placeholder="Confirm password" class="w-full bg-[#1c2125] border border-gray-600 p-4 rounded-xl text-white">
            <button class="w-full aurapay-blue py-4 rounded-full font-bold text-lg">Create a new wallet</button>
        </div>
    </div>

    <div id="import-page" class="hidden w-full max-w-md">
        <h1 class="text-3xl font-bold mb-4 text-center">Import with SRP</h1>
        <p class="text-gray-400 mb-8 text-center px-4">अपने 12 शब्दों का Secret Recovery Phrase यहाँ डालें।</p>

        <div class="space-y-6 px-4">
            <div class="relative">
                <textarea id="seed-input" rows="4" placeholder="यहाँ अपने 12 शब्द लिखें (जैसे: apple banana cherry...)" 
                class="w-full bg-[#1c2125] border border-gray-600 p-4 rounded-xl text-white text-sm leading-relaxed"></textarea>
            </div>
            
            <p class="text-xs text-gray-500 italic px-2">टिप: शब्दों के बीच में एक Space दें।</p>

            <button onclick="handleImport()" class="w-full aurapay-blue py-4 rounded-full font-bold text-lg mt-4 shadow-lg">
                Import Wallet
            </button>
        </div>
    </div>

    <script>
        // पेज बदलने का सिंपल फंक्शन
        function showPage(pageId) {
            // सारे पेजों को छुपा दो
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('password-page').classList.add('hidden');
            document.getElementById('import-page').classList.add('hidden');
            
            // जो पेज चाहिए उसे दिखा दो
            document.getElementById(pageId).classList.remove('hidden');
        }

        // इंपोर्ट करने का लॉजिक
        function handleImport() {
            const seed = document.getElementById('seed-input').value.trim();
            const words = seed.split(" ");

            if (words.length < 12) {
                alert("कृपया पूरे 12 शब्द डालें। अभी आपने सिर्फ " + words.length + " शब्द लिखे हैं।");
                return;
            }

            alert("पहचान हो गई! आपका पुराना वॉलेट अब AuraPay से जुड़ रहा है।");
            // यहाँ हम अगले स्टेप में Dashboard पर ले जाएंगे
        }
    </script>
</body>
</html>
