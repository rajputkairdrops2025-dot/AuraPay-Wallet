<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPay - World's Secure Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
</head>
<body class="bg-[#0d1117] text-white flex flex-col items-center justify-center min-h-screen p-4">

    <h1 class="text-4xl font-bold text-cyan-400 mb-2">AURAPAY</h1>
    <p class="text-gray-400 mb-8 text-sm uppercase tracking-widest">Next-Gen Security</p>

    <div id="setup-screen" class="bg-gray-900 p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-gray-800 text-center">
        <div class="mb-6">
            <span class="text-5xl">🔐</span>
        </div>
        <h2 class="text-xl font-bold mb-4">अपना सुरक्षित वॉलेट बनाएं</h2>
        <button onclick="createWallet()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 py-4 rounded-2xl font-bold text-lg hover:opacity-90 transition shadow-lg">
            Create New Wallet
        </button>
    </div>

    <div id="wallet-screen" class="hidden bg-gray-900 p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-gray-800">
        <p class="text-gray-500 text-xs text-center">MY ADDRESS</p>
        <p id="addr" class="text-[10px] text-cyan-300 text-center break-all mb-6 font-mono bg-black/30 p-2 rounded-lg"></p>
        
        <div class="text-center mb-8">
            <p class="text-gray-500 text-xs uppercase">Balance</p>
            <h2 class="text-4xl font-bold text-white">$0.00</h2>
        </div>

        <div class="bg-yellow-900/20 border border-yellow-700/50 p-4 rounded-xl mb-6 text-center">
            <p class="text-yellow-500 text-[10px] font-bold uppercase mb-1">⚠️ Secret Seed Phrase (इसे लिख लें)</p>
            <p id="seed" class="text-xs text-yellow-200 italic break-words"></p>
        </div>
        
        <button onclick="location.reload()" class="w-full bg-gray-800 py-3 rounded-xl text-sm font-semibold">Log Out</button>
    </div>

    <script>
        async function createWallet() {
            // 1. नया वॉलेट जनरेट करना
            const wallet = ethers.Wallet.createRandom();
            
            // 2. स्क्रीन बदलना
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('wallet-screen').classList.remove('hidden');
            
            // 3. डेटा दिखाना
            document.getElementById('addr').innerText = wallet.address;
            document.getElementById('seed').innerText = wallet.mnemonic.phrase;
            
            alert("बधाई हो! आपका वॉलेट बन गया। अपनी 12 शब्दों की चाबी सुरक्षित रखें।");
        }
    </script>
</body>
</html>
