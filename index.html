<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPay - Secure Crypto Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Inter', sans-serif; }
        .gradient-border { border: 2px solid; border-image: linear-gradient(to right, #00ffcc, #3366ff) 1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="text-center mb-10">
        <h1 class="text-5xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
            AURAPAY
        </h1>
        <p class="text-gray-400 mt-2 text-sm italic">Non-Custodial. 2FA Secured. Ultra Low Fee.</p>
    </div>

    <div class="bg-gray-900 p-8 rounded-3xl shadow-2xl w-80 text-center border border-gray-800">
        <p class="text-gray-500 text-xs uppercase mb-1">Total Balance</p>
        <h2 class="text-3xl font-bold mb-6">$0.00</h2>
        
        <div class="grid grid-cols-2 gap-4">
            <button class="bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">Send</button>
            <button class="bg-gray-800 hover:bg-gray-700 py-3 rounded-xl font-bold transition">Receive</button>
        </div>
    </div>

    <div class="fixed bottom-6 bg-gray-900/80 backdrop-blur-md px-6 py-4 rounded-full flex gap-10 border border-gray-700">
        <span>🏠</span>
        <span>🔄</span>
        <span class="bg-blue-500 p-2 rounded-full -mt-2">🔘</span>
        <span>🔍</span>
        <span>👛</span>
    </div>

</body>
</html>
