<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPay - Create Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #24292e; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .aurapay-blue { background-color: #037dd6; }
        .aurapay-blue:hover { background-color: #0260a4; }
        .outline-button { border: 2px solid #037dd6; color: #037dd6; }
        .hidden { display: none; }
        input:focus { border-color: #037dd6; outline: none; }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">

    <div id="setup-page" class="w-full max-w-md flex flex-col items-center h-full">
        <div class="w-full flex items-center justify-between mt-4 mb-20">
            <button class="text-[#037dd6] font-semibold text-lg">‹ Back</button>
            <h2 class="text-xl font-bold tracking-[0.3em] text-gray-200">AURAPAY</h2>
            <div class="w-10"></div>
        </div>

        <div class="text-center flex-1 flex flex-col justify-start mt-10">
            <h1 class="text-4xl font-bold mb-4">Wallet setup</h1>
            <p class="text-gray-400 text-lg mb-12 px-6">Import an existing wallet or create a new one</p>
            <div class="space-y-5 w-full px-4">
                <button class="w-full outline-button py-4 rounded-full font-bold text-[16px]">Import existing wallet</button>
                <button onclick="showPasswordPage()" class="w-full aurapay-blue py-4 rounded-full font-bold text-[16px] shadow-lg">Create a new wallet</button>
            </div>
        </div>
    </div>

    <div id="password-page" class="hidden w-full max-w-md">
        <div class="w-full flex items-center justify-between mt-4 mb-10">
            <button onclick="showSetupPage()" class="text-[#037dd6] font-semibold text-lg">‹ Back</button>
            <h2 class="text-xl font-bold tracking-[0.3em] text-gray-200">AURAPAY</h2>
            <div class="w-10"></div>
        </div>

        <h1 class="text-3xl font-bold mb-4 text-center">Create password</h1>
        <p class="text-gray-400 mb-8 text-center px-4">This password will unlock your AuraPay wallet only on this device.</p>

        <div class="space-y-6 px-4">
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">New password (min 8 chars)</label>
                <input type="password" id="pass1" class="w-full bg-[#1c2125] border border-gray-600 p-4 rounded-xl text-white">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Confirm password</label>
                <input type="password" id="pass2" class="w-full bg-[#1c2125] border border-gray-600 p-4 rounded-xl text-white">
            </div>
            
            <div class="flex items-start gap-3 mt-4">
                <input type="checkbox" id="terms" class="mt-1 w-5 h-5 rounded border-gray-600">
                <p class="text-sm text-gray-400 italic">I understand that AuraPay cannot recover this password for me. <span class="text-sky-500 underline">Learn more</span></p>
            </div>

            <button onclick="handleCreatePassword()" class="w-full aurapay-blue py-4 rounded-full font-bold text-lg mt-8 transition-all">
                Create a new wallet
            </button>
        </div>
    </div>

    <script>
        // एक पेज से दूसरे पेज पर जाने का 'जादू'
        function showPasswordPage() {
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('password-page').classList.remove('hidden');
        }

        function showSetupPage() {
            document.getElementById('password-page').classList.add('hidden');
            document.getElementById('setup-page').classList.remove('hidden');
        }

        // पासवर्ड चेक करने का तरीका
        function handleCreatePassword() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const agree = document.getElementById('terms').checked;

            if (p1.length < 8) {
                alert("पासवर्ड कम से कम 8 अक्षर का होना चाहिए!");
                return;
            }
            if (p1 !== p2) {
                alert("दोनों पासवर्ड मैच नहीं हो रहे हैं!");
                return;
            }
            if (!agree) {
                alert("कृपया चेकबॉक्स पर टिक करें!");
                return;
            }

            alert("पासवर्ड सेट हो गया! अब हम '12 शब्दों वाली चाबी' (Seed Phrase) बनाएंगे।");
            // अगले स्टेप के लिए यहाँ क्लिक करेंगे (Next Code)
        }
    </script>
</body>
</html>
