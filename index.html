<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPay - Premium Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a2a3a 0%, #0a0e14 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .ton-glow {
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-8">

    <div></div>

    <div class="flex flex-col items-center">
        <div class="w-32 h-32 bg-sky-500 rounded-[2rem] transform rotate-45 flex items-center justify-center shadow-[0_0_40px_rgba(14,165,233,0.4)] mb-12">
            <span class="transform -rotate-45 text-5xl font-bold text-white tracking-tighter">AP</span>
        </div>
        
        <h1 class="text-3xl font-bold mb-2">AuraPay</h1>
        <p class="text-gray-400 text-center max-w-[250px] text-sm">Create a new wallet or add an existing one</p>
    </div>

    <div class="w-full max-w-sm space-y-4 mb-4">
        
        <button onclick="generateNew()" class="w-full bg-[#38bdf8] hover:bg-[#0ea5e9] text-[#0a0e14] py-4 rounded-2xl font-bold text-lg transition-all active:scale-95 shadow-lg">
            Create New Wallet
        </button>

        <button onclick="showImport()" class="w-full bg-[#1c252e] hover:bg-[#252f3a] text-white py-4 rounded-2xl font-bold text-lg transition-all active:scale-95 border border-gray-800">
            Import Existing Wallet
        </button>

    </div>

    <div id="wallet-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center p-6 z-50">
        <div class="glass-card w-full max-w-sm p-8 rounded-[2.5rem] text-center">
            <div id="modal-icon" class="text-4xl mb-4">✨</div>
            <h3 id="modal-title" class="text-xl font-bold mb-4">Your Wallet</h3>
            
            <div class="text-left space-y-4">
                <div class="bg-black/20 p-4 rounded-xl">
                    <p class="text-[10px] text-sky-400 font-bold uppercase mb-1">Address</p>
                    <p id="disp-addr" class="text-[11px] font-mono break-all text-gray-300"></p>
                </div>
                <div id="seed-box" class="bg-yellow-500/5 p-4 rounded-xl border border-yellow-700/20">
                    <p class="text-yellow-500 text-[10px] font-bold uppercase mb-1">Secret Recovery Phrase</p>
                    <p id="disp-seed" class="text-[12px] italic text-yellow-100/70"></p>
                </div>
            </div>

            <button onclick="location.reload()" class="mt-8 text-gray-500 hover:text-white text-sm">Close & Reset</button>
        </div>
    </div>

    <script>
        // नया वॉलेट बनाने के लिए
        function generateNew() {
            const wallet = ethers.Wallet.createRandom();
            showScreen(wallet.address, wallet.mnemonic.phrase, "Wallet Created!");
        }

        // इम्पोर्ट करने के लिए (अभी सिर्फ अलर्ट दिखाएगा, अगले स्टेप में हम बॉक्स बनाएंगे)
        function showImport() {
            const phrase = prompt("Enter your 12-word recovery phrase:");
            if (phrase) {
                try {
                    const wallet = ethers.Wallet.fromMnemonic(phrase.trim());
                    showScreen(wallet.address, "Imported from seed", "Wallet Imported!");
                    document.getElementById('seed-box').classList.add('hidden');
                } catch (e) {
                    alert("Invalid Seed Phrase! कृपया सही 12 शब्द डालें।");
                }
            }
        }

        function showScreen(addr, seed, title) {
            document.getElementById('wallet-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('disp-addr').innerText = addr;
            document.getElementById('disp-seed').innerText = seed;
        }
    </script>
</body>
</html>
