<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPay - Professional Web3 Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --mehandi-dark: #0b140d; /* डार्क मेहंदी रंग */
            --mehandi-light: #1a2e1f;
        }
        body {
            background-color: var(--mehandi-dark);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }
        .btn-blue { background-color: #007aff; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .numpad-btn { background: rgba(255, 255, 255, 0.08); border-radius: 50%; width: 70px; height: 70px; font-size: 24px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-welcome" class="flex flex-col items-center justify-between min-h-screen p-8 w-full max-w-md mx-auto">
        <div class="mt-20 flex flex-col items-center">
            <div class="w-24 h-24 bg-sky-500 rounded-3xl rotate-45 flex items-center justify-center shadow-2xl mb-10">
                <span class="rotate-[-45deg] text-4xl font-bold italic">AP</span>
            </div>
            <h1 class="text-3xl font-bold">AuraPay</h1>
            <p class="text-gray-400 mt-2">Create a new wallet or add an existing one</p>
        </div>
        <div class="w-full space-y-4 mb-10">
            <button onclick="goToPasscode('create')" class="w-full btn-blue py-4 rounded-2xl font-bold text-lg">Create New Wallet</button>
            <button onclick="showImport()" class="w-full bg-white/10 py-4 rounded-2xl font-bold text-lg border border-white/10">Import Existing Wallet</button>
        </div>
    </div>

    <div id="screen-passcode" class="hidden flex flex-col items-center justify-center min-h-screen p-8 w-full max-w-md mx-auto">
        <h2 class="text-2xl font-bold mb-2">Create passcode</h2>
        <div class="flex gap-4 mb-20 mt-4">
            <div id="dot-1" class="w-3 h-3 rounded-full border border-gray-500"></div>
            <div id="dot-2" class="w-3 h-3 rounded-full border border-gray-500"></div>
            <div id="dot-3" class="w-3 h-3 rounded-full border border-gray-500"></div>
            <div id="dot-4" class="w-3 h-3 rounded-full border border-gray-500"></div>
        </div>
        <div class="grid grid-cols-3 gap-8">
            <button class="numpad-btn" onclick="pressKey(1)">1</button>
            <button class="numpad-btn" onclick="pressKey(2)">2</button>
            <button class="numpad-btn" onclick="pressKey(3)">3</button>
            <button class="numpad-btn" onclick="pressKey(4)">4</button>
            <button class="numpad-btn" onclick="pressKey(5)">5</button>
            <button class="numpad-btn" onclick="pressKey(6)">6</button>
            <button class="numpad-btn" onclick="pressKey(7)">7</button>
            <button class="numpad-btn" onclick="pressKey(8)">8</button>
            <button class="numpad-btn" onclick="pressKey(9)">9</button>
            <div></div>
            <button class="numpad-btn" onclick="pressKey(0)">0</button>
            <button class="text-2xl" onclick="backspace()">⌫</button>
        </div>
    </div>

    <div id="screen-main" class="hidden flex flex-col min-h-screen w-full max-w-md mx-auto">
        <div class="p-6 flex justify-between items-center">
            <button class="text-xl">💬</button>
            <div class="bg-white/10 px-4 py-1 rounded-full text-sm font-medium">Wallet ∨</div>
            <button class="text-xl">⚙️</button>
        </div>

        <div class="text-center py-10">
            <h1 id="main-balance" class="text-5xl font-bold">$0 <span class="text-xl text-sky-400">⚡</span></h1>
            <p id="main-address" class="text-gray-500 text-xs mt-4 font-mono"></p>
        </div>

        <div class="grid grid-cols-3 gap-4 px-6 mb-8 text-center">
            <div class="flex flex-col items-center"><button class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl mb-2">↑</button><span class="text-xs">Send</span></div>
            <div class="flex flex-col items-center"><button class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl mb-2">↓</button><span class="text-xs">Receive</span></div>
            <div class="flex flex-col items-center"><button class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl mb-2">⛶</button><span class="text-xs">Scan</span></div>
            <div class="flex flex-col items-center"><button class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl mb-2">⇄</button><span class="text-xs">Swap</span></div>
            <div class="flex flex-col items-center"><button class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl mb-2">$</button><span class="text-xs">Buy</span></div>
            <div class="flex flex-col items-center"><button class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl mb-2">📈</button><span class="text-xs">Stake</span></div>
        </div>

        <div class="px-6 space-y-3 overflow-y-auto pb-24">
            <h3 class="font-bold">Finish setting up</h3>
            <div class="bg-white/5 p-4 rounded-2xl flex items-center gap-4">
                <span class="text-2xl text-orange-400">🔑</span>
                <div class="flex-1">
                    <p class="text-sm font-bold">Back up your recovery phrase</p>
                    <p class="text-[10px] text-gray-500">Without it, you can't restore your wallet</p>
                </div>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-sky-500 rounded-full flex items-center justify-center font-bold">T</div>
                    <div><p class="font-bold">TON</p><p class="text-[10px] text-gray-500">$1.29 <span class="text-red-500">-2.38%</span></p></div>
                </div>
                <div class="text-right"><p class="font-bold">0</p><p class="text-[10px] text-gray-500">$0</p></div>
            </div>
        </div>

        <div class="fixed bottom-0 w-full max-w-md bg-black/40 backdrop-blur-md flex justify-around py-4 border-t border-white/5">
            <span class="text-sky-400 flex flex-col items-center text-[10px]">👛<br>Wallet</span>
            <span class="text-gray-500 flex flex-col items-center text-[10px]">🕒<br>History</span>
            <span class="text-gray-500 flex flex-col items-center text-[10px]">🧭<br>Browser</span>
            <span class="text-gray-500 flex flex-col items-center text-[10px]">⭐<br>Collectibles</span>
        </div>
    </div>

    <script>
        let pin = "";
        let mode = "";

        function goToPasscode(m) {
            mode = m;
            document.getElementById('screen-welcome').classList.add('hidden');
            document.getElementById('screen-passcode').classList.remove('hidden');
        }

        function pressKey(num) {
            if (pin.length < 4) {
                pin += num;
                updateDots();
                if (pin.length === 4) {
                    setTimeout(finishSetup, 300);
                }
            }
        }

        function backspace() {
            pin = pin.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            for (let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i <= pin.length) {
                    dot.classList.add('bg-white');
                } else {
                    dot.classList.remove('bg-white');
                }
            }
        }

        function finishSetup() {
            if (mode === 'create') {
                const wallet = ethers.Wallet.createRandom();
                localStorage.setItem('aura_addr', wallet.address);
                document.getElementById('main-address').innerText = wallet.address.substring(0,6) + "..." + wallet.address.substring(38);
                alert("Your Seed Phrase: " + wallet.mnemonic.phrase + "\n\nइसे सुरक्षित लिख लें!");
            }
            document.getElementById('screen-passcode').classList.add('hidden');
            document.getElementById('screen-main').classList.remove('hidden');
        }

        function showImport() {
            const seed = prompt("Enter 12-word seed phrase:");
            if(seed) {
                try {
                    const wallet = ethers.Wallet.fromMnemonic(seed.trim());
                    localStorage.setItem('aura_addr', wallet.address);
                    goToPasscode('import');
                } catch(e) { alert("Invalid Seed!"); }
            }
        }
    </script>
</body>
</html>
